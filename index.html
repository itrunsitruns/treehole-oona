
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tree Hole & Ööna</title>

<script src="https://cdn.jsdelivr.net/npm/p5@1.9.3/lib/p5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.3/lib/addons/p5.sound.min.js"></script>

<style>
body{
margin:0;
overflow:hidden;
background:#0f0a19;
font-family:Arial;
}

#text{
position:fixed;
top:20px;
left:20px;
color:white;
opacity:.6;
font-size:14px;
}
</style>

</head>

<body>

<div id="text">
🌙 Tree Hole & Ööna<br>
Hold = emotion<br>
Release = calm<br>
Speak or breathe to move the stars
</div>

<script>

let pressTime = 0
let intensity = 0
let stars = []
let mic

function setup(){

createCanvas(window.innerWidth, window.innerHeight)
background(15,10,25)

strokeWeight(2)

mic = new p5.AudioIn()
mic.start()

for(let i=0;i<120;i++){
stars.push({
x:random(width),
y:random(height),
size:random(1,3),
speed:random(.1,.5)
})
}

}

function draw(){

let soundLevel = mic.getLevel()

// breathing pulse
let breath = sin(frameCount*0.02)*20

noStroke()
fill(15,10,25,10)
rect(0,0,width,height)

drawStars(soundLevel)

if(mouseIsPressed){

pressTime++
intensity = min(255, pressTime*3)

let r = map(intensity,0,255,80,255)
let g = map(intensity,0,255,40,120)
let b = map(intensity,0,255,120,255)

stroke(r+breath,g,b+breath,intensity)

let wild = map(pressTime,0,200,10,150)

for(let i=0;i<4;i++){

let offset=random(-wild,wild)

line(
mouseX+offset,
mouseY+offset,
pmouseX+offset,
pmouseY+offset
)

}

}else{

pressTime=0
intensity=0

}

}

function drawStars(soundLevel){

for(let s of stars){

let flicker = random(1,3)+soundLevel*50

noStroke()
fill(200,220,255,180)

circle(s.x,s.y,s.size+flicker)

s.y += s.speed + soundLevel*5

if(s.y>height){
s.y=0
s.x=random(width)
}

}

}

function windowResized(){
resizeCanvas(window.innerWidth,window.innerHeight)
}

</script>

</body>
</html>
